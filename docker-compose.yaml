services:
  pika-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pika-backend
    ports:
      - "8000:8000"
    volumes:
      - /volume1/Projects/Pika/data/uploads/medical:/app/data/uploads/medical  # 原图，单独挂载
      - /volume1/Projects/Pika/data/avatars:/app/data/avatars                  # 头像，单独挂载
      - /volume1/Projects/Pika/data/db:/app/data/db                            # SQLite，单独挂载
    environment:                              # 凭据由 .env 注入（NAS 本地，不入 git）
      - TZ=${TZ}
      - DATA_DIR=/app/data
      - UPLOAD_DIR=/app/data/uploads/medical
      - AVATAR_DIR=/app/data/avatars
      - DB_PATH=/app/data/db/pika.db
      - WX_APPID=${WX_APPID}
      - WX_SECRET=${WX_SECRET}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    restart: unless-stopped

  # 内网穿透客户端：主动连 Azure VM 的 frps，把 pika-backend:8000 透到公网
  # （家人微信走 https://<公网域名> → VM Caddy → frps → 此 frpc → pika-backend；域名/IP/token 在 .env）
  frpc:
    image: snowdreamtech/frpc:latest
    container_name: pika-frpc
    restart: unless-stopped
    depends_on:
      - pika-backend
    environment:
      - FRP_TOKEN=${FRP_TOKEN}
      - FRP_SERVER_ADDR=${FRP_SERVER_ADDR}
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN}
    volumes:
      - ./frpc.toml:/etc/frp/frpc.toml:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
